<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaleidoscope Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: #2d2d2d;
      border-bottom: 1px solid rgba(255, 68, 68, 0.4);
      overflow: hidden;
    }

    .toolbar-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
      transition: background 0.15s;
    }
    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
    }

    .toolbar-effects {
      display: flex;
      gap: 6px;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
      align-items: center;
    }
    .toolbar-effects::-webkit-scrollbar { display: none; }

    .effect-btn {
      flex-shrink: 0;
      padding: 5px 10px;
      font-size: 0.78em;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.15s;
    }
    .effect-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .effect-btn.active {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-color: #22c55e;
      color: #000;
      font-weight: 600;
    }

    .presets-label {
      color: #ff4444;
      font-weight: 600;
      font-size: 0.78em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .preset-chips {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 1;
      min-width: 0;
    }
    .preset-chips::-webkit-scrollbar { display: none; }

    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.4);
      color: #86efac;
      border-radius: 3px;
      font-size: 0.75em;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .preset-chip:hover {
      background: rgba(74, 222, 128, 0.3);
    }
    .preset-chip .delete-btn {
      background: none;
      border: none;
      color: #86efac;
      cursor: pointer;
      font-size: 1em;
      padding: 0;
      line-height: 1;
    }
    .preset-chip .delete-btn:hover {
      color: #ff6b6b;
    }

    .save-preset-btn {
      flex-shrink: 0;
      padding: 3px 8px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: #60a5fa;
      border-radius: 3px;
      font-size: 0.75em;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .save-preset-btn:hover:not(:disabled) {
      background: rgba(59, 130, 246, 0.3);
    }
    .save-preset-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .toolbar-status {
      flex-shrink: 0;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      display: none;
      font-size: 0.75em;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .status.loading {
      display: inline-flex;
      align-items: center;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }
    .status.success {
      display: inline-flex;
      align-items: center;
      background: rgba(74, 222, 128, 0.2);
      color: #86efac;
    }
    .status.error {
      display: inline-flex;
      align-items: center;
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top: 2px solid #60a5fa;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN AREA ── */
    .main-area {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 110px 1fr 1fr 110px;
      overflow: hidden;
    }

    /* ── HISTORY STRIPS ── */
    .history-strip {
      background: #1e1e1e;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px 4px;
    }
    .history-strip::-webkit-scrollbar { width: 4px; }
    .history-strip::-webkit-scrollbar-track { background: transparent; }
    .history-strip::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 2px; }

    .source-strip {
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }
    .result-strip {
      border-left: 1px solid rgba(255, 255, 255, 0.06);
    }

    .history-thumb {
      width: 92px;
      height: 92px;
      flex-shrink: 0;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      background: #111;
    }
    .history-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .history-thumb.active {
      border-color: #4ade80;
    }
    .history-thumb:hover:not(.active) {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .strip-label {
      font-size: 0.65em;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 0 2px;
      flex-shrink: 0;
    }

    /* ── IMAGE PANELS ── */
    .image-panel {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .image-panel img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .panel-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 0.7em;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      pointer-events: none;
      z-index: 1;
    }

    .source-badge {
      position: absolute;
      top: 8px;
      right: 12px;
      background: rgba(74, 222, 128, 0.7);
      color: #000;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 0.7em;
      font-weight: 600;
      z-index: 1;
    }

    .no-image-msg {
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.9em;
    }

    .result-download-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(59, 130, 246, 0.3);
      border: 1px solid rgba(59, 130, 246, 0.5);
      color: #60a5fa;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.78em;
      text-decoration: none;
      transition: background 0.15s;
      z-index: 1;
    }
    .result-download-btn:hover {
      background: rgba(59, 130, 246, 0.5);
    }

    /* ── PARAM POPOVER ── */
    .param-popover {
      position: fixed;
      z-index: 1000;
      display: none;
      background: #2d2d2d;
      border: 1px solid rgba(255, 68, 68, 0.5);
      border-radius: 8px;
      padding: 12px;
      min-width: 200px;
      max-width: 280px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      max-height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .param-popover.visible {
      display: block;
    }

    .param-group {
      margin-bottom: 10px;
    }
    .param-group:last-child {
      margin-bottom: 0;
    }

    .param-group label {
      display: block;
      font-size: 0.78em;
      color: #aaa;
      margin-bottom: 4px;
    }

    .param-group input[type="text"] {
      width: 100%;
      padding: 5px 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #fff;
      font-size: 0.8em;
    }

    /* ── DROP OVERLAY ── */
    .drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(74, 222, 128, 0.08);
      border: 3px dashed rgba(74, 222, 128, 0.5);
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .drop-overlay.active {
      display: flex;
    }
    .drop-overlay-text {
      background: rgba(0, 0, 0, 0.7);
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 1.2em;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <button class="toolbar-btn upload-btn" id="uploadBtn">Upload</button>
      <input type="file" id="imageInput" accept="image/*" style="display:none">

      <div class="toolbar-divider"></div>

      <div class="toolbar-effects" id="effectGrid"></div>

      <div class="toolbar-divider"></div>

      <span class="presets-label">Presets</span>
      <div class="preset-chips" id="presetChips"></div>
      <button class="save-preset-btn" id="savePresetBtn" disabled>+ Save</button>

      <div class="toolbar-divider"></div>

      <div class="toolbar-status">
        <div class="status" id="status"></div>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">
      <div class="history-strip source-strip" id="sourceHistoryStrip">
        <span class="strip-label">Sources</span>
      </div>

      <div class="image-panel" id="sourcePanel">
        <span class="panel-label">Source</span>
        <div class="no-image-msg">Upload or drag an image</div>
      </div>

      <div class="image-panel" id="resultPanel">
        <span class="panel-label">Result</span>
        <div class="no-image-msg">Select an effect</div>
      </div>

      <div class="history-strip result-strip" id="resultHistoryStrip">
        <span class="strip-label">Results</span>
      </div>
    </div>

    <!-- PARAM POPOVER -->
    <div class="param-popover" id="paramPopover"></div>

    <!-- DROP OVERLAY -->
    <div class="drop-overlay" id="dropOverlay">
      <div class="drop-overlay-text">Drop image to upload</div>
    </div>

  </div>

  <script>
    // ── STATE ──
    let selectedEffect = null;
    let uploadedImagePath = null;
    let currentSourcePath = null;
    let currentSourceType = null;
    let currentSourceDataURI = null;
    let activeSourceId = null;
    let currentResultPath = null;
    let sourceHistory = [];
    let resultHistory = [];

    // ── INIT ──
    fetch('/api/effects')
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('effectGrid');
        data.effects.forEach(effect => {
          const btn = document.createElement('button');
          btn.className = 'effect-btn';
          btn.textContent = effect.name;
          btn.onclick = (e) => selectEffect(effect, e.currentTarget);
          grid.appendChild(btn);
        });
        loadPresets();
      });

    // ── UPLOAD ──
    const imageInput = document.getElementById('imageInput');
    document.getElementById('uploadBtn').onclick = () => imageInput.click();
    imageInput.onchange = (e) => {
      if (e.target.files[0]) handleImageUpload(e.target.files[0]);
    };

    // Drag-drop on the whole window
    let dragCounter = 0;
    const dropOverlay = document.getElementById('dropOverlay');

    document.body.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      dropOverlay.classList.add('active');
    });
    document.body.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropOverlay.classList.remove('active');
      }
    });
    document.body.addEventListener('dragover', (e) => e.preventDefault());
    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.classList.remove('active');
      if (e.dataTransfer.files[0]) handleImageUpload(e.dataTransfer.files[0]);
    });

    function handleImageUpload(file) {
      if (!file || !file.type.startsWith('image/')) {
        showStatus('Please select an image file', 'error');
        return;
      }

      currentSourceType = 'upload';
      currentSourcePath = null;
      uploadedImagePath = 'uploaded';

      const reader = new FileReader();
      reader.onload = (e) => {
        const dataURI = e.target.result;
        currentSourceDataURI = dataURI;
        updateSourcePreview(dataURI, 'upload');
        addToSourceHistory(dataURI, 'upload');
      };
      reader.readAsDataURL(file);

      showStatus('Image uploaded', 'success');
    }

    // ── SOURCE PREVIEW ──
    function updateSourcePreview(src, type) {
      const panel = document.getElementById('sourcePanel');
      panel.innerHTML = `<span class="panel-label">Source</span><img src="${src}" alt="Source">`;
      if (type === 'generated') {
        const badge = document.createElement('div');
        badge.className = 'source-badge';
        badge.textContent = 'From result';
        panel.appendChild(badge);
      }
    }

    // ── SOURCE HISTORY ──
    function addToSourceHistory(src, type) {
      if (sourceHistory.some(e => e.src === src)) {
        activeSourceId = sourceHistory.find(e => e.src === src).id;
        renderSourceHistory();
        return;
      }
      const id = Date.now() + Math.random();
      activeSourceId = id;
      sourceHistory.unshift({ id, src, type });
      renderSourceHistory();
    }

    function renderSourceHistory() {
      const strip = document.getElementById('sourceHistoryStrip');
      strip.innerHTML = '<span class="strip-label">Sources</span>';
      sourceHistory.forEach(entry => {
        const thumb = document.createElement('div');
        thumb.className = 'history-thumb' + (entry.id === activeSourceId ? ' active' : '');
        thumb.innerHTML = `<img src="${entry.src}">`;
        thumb.onclick = () => switchSource(entry);
        strip.appendChild(thumb);
      });
    }

    function switchSource(entry) {
      activeSourceId = entry.id;
      updateSourcePreview(entry.src, entry.type);
      if (entry.type === 'upload') {
        currentSourceType = 'upload';
        currentSourcePath = null;
        uploadedImagePath = 'uploaded';
        currentSourceDataURI = entry.src;
      } else {
        currentSourceType = 'generated';
        currentSourcePath = entry.src;
        uploadedImagePath = null;
        currentSourceDataURI = null;
      }
      renderSourceHistory();
      updateSavePresetBtn();
    }

    // ── RESULT HISTORY ──
    function renderResultHistory() {
      const strip = document.getElementById('resultHistoryStrip');
      strip.innerHTML = '<span class="strip-label">Results</span>';
      resultHistory.forEach(entry => {
        const thumb = document.createElement('div');
        thumb.className = 'history-thumb' + (entry.imagePath === currentResultPath ? ' active' : '');
        thumb.innerHTML = `<img src="${entry.imagePath}">`;
        thumb.title = entry.title;
        thumb.onclick = () => useAsSource(entry.imagePath);
        strip.appendChild(thumb);
      });
    }

    function showResultImage(imagePath, title) {
      currentResultPath = imagePath;
      const panel = document.getElementById('resultPanel');
      panel.innerHTML = `
        <span class="panel-label">Result</span>
        <img src="${imagePath}" alt="${title}">
        <a class="result-download-btn" href="${imagePath}" download title="Download result">Download</a>
      `;
    }

    // ── EFFECTS ──
    function populateEffect(effect, overrideParams) {
      selectedEffect = effect;

      document.querySelectorAll('.effect-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === effect.name);
      });

      const popover = document.getElementById('paramPopover');
      popover.innerHTML = '';

      if (Object.keys(effect.params).length > 0) {
        Object.entries(effect.params).forEach(([key, defaultVal]) => {
          const group = document.createElement('div');
          group.className = 'param-group';

          const label = document.createElement('label');
          label.textContent = key.charAt(0).toUpperCase() + key.slice(1);

          const input = document.createElement('input');
          input.type = 'text';
          input.value = overrideParams && overrideParams[key] !== undefined ? overrideParams[key] : defaultVal;
          input.dataset.param = key;
          input.onchange = () => {
            const hasSource = uploadedImagePath || (currentSourceType === 'generated' && currentSourcePath);
            if (hasSource && selectedEffect) processImage();
          };

          group.appendChild(label);
          group.appendChild(input);
          popover.appendChild(group);
        });
      }

      updateSavePresetBtn();
    }

    function selectEffect(effect, btnEl) {
      const isSameEffect = selectedEffect && selectedEffect.id === effect.id;

      if (!isSameEffect) {
        populateEffect(effect);
      }

      const popover = document.getElementById('paramPopover');
      if (Object.keys(effect.params).length > 0 && btnEl) {
        positionPopover(btnEl);
        popover.classList.add('visible');
      } else {
        popover.classList.remove('visible');
      }

      const hasSource = uploadedImagePath || (currentSourceType === 'generated' && currentSourcePath);
      if (hasSource && selectedEffect) {
        processImage();
      }
    }

    function positionPopover(btnEl) {
      const popover = document.getElementById('paramPopover');
      const rect = btnEl.getBoundingClientRect();
      const popWidth = 240;
      let left = rect.left;
      if (left + popWidth + 8 > window.innerWidth) {
        left = window.innerWidth - popWidth - 8;
      }
      popover.style.top = '52px';
      popover.style.left = left + 'px';
    }

    // Close popover on outside click or Escape
    document.addEventListener('click', (e) => {
      const popover = document.getElementById('paramPopover');
      if (!popover.classList.contains('visible')) return;
      if (!popover.contains(e.target) && !e.target.closest('.effect-btn')) {
        popover.classList.remove('visible');
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('paramPopover').classList.remove('visible');
      }
    });

    function updateSavePresetBtn() {
      document.getElementById('savePresetBtn').disabled = !selectedEffect;
    }

    // ── PROCESS ──
    function dataURItoBlob(dataURI) {
      const [header, data] = dataURI.split(',');
      const mime = header.match(/:(.*?);/)[1];
      const bytes = atob(data);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return new Blob([arr], { type: mime });
    }

    async function processImage() {
      showStatus('<span class="loading-spinner"></span>Processing...', 'loading');

      const formData = new FormData();

      if (currentSourceType === 'generated' && currentSourcePath) {
        formData.append('existingImage', currentSourcePath);
      } else if (currentSourceDataURI) {
        formData.append('image', dataURItoBlob(currentSourceDataURI), 'source.png');
      } else {
        const imageFile = document.getElementById('imageInput').files[0];
        if (imageFile) {
          formData.append('image', imageFile);
        }
      }

      formData.append('effect', selectedEffect.id);

      const params = {};
      document.querySelectorAll('[data-param]').forEach(input => {
        params[input.dataset.param] = input.value;
      });
      formData.append('params', JSON.stringify(params));

      try {
        const response = await fetch('/api/process', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Processing failed');
        const result = await response.json();

        if (result.success) {
          addResult(selectedEffect.name, result.outputPath);
          showStatus('Done', 'success');
        } else {
          showStatus(result.error, 'error');
        }
      } catch (error) {
        showStatus(error.message, 'error');
      }
    }

    function addResult(title, imagePath) {
      resultHistory.unshift({ title, imagePath });
      showResultImage(imagePath, title);
      renderResultHistory();
    }

    function useAsSource(imagePath) {
      updateSourcePreview(imagePath, 'generated');
      currentSourcePath = imagePath;
      currentSourceType = 'generated';
      uploadedImagePath = null;
      currentSourceDataURI = null;
      document.getElementById('imageInput').value = '';
      addToSourceHistory(imagePath, 'generated');
      renderResultHistory();
      updateSavePresetBtn();
      showStatus('Using result as source', 'success');
    }

    // ── STATUS ──
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.innerHTML = message;
      status.className = `status ${type}`;
    }

    // ── PRESETS ──
    async function loadPresets() {
      try {
        const response = await fetch('/api/presets');
        const data = await response.json();
        renderPresetChips(data.presets);
      } catch (error) {
        console.error('Error loading presets:', error);
      }
    }

    function renderPresetChips(presets) {
      const container = document.getElementById('presetChips');
      container.innerHTML = '';
      presets.forEach(preset => {
        const chip = document.createElement('button');
        chip.className = 'preset-chip';
        chip.innerHTML = `${preset.name} <button class="delete-btn" title="Delete preset">&times;</button>`;
        chip.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) {
            e.stopPropagation();
            if (confirm(`Delete preset "${preset.name}"?`)) {
              deletePreset(preset.name);
            }
          } else {
            applyPreset(preset);
          }
        });
        container.appendChild(chip);
      });
    }

    async function applyPreset(preset) {
      const response = await fetch('/api/effects');
      const data = await response.json();
      const effect = data.effects.find(e => e.id === preset.effectId);

      if (effect) {
        populateEffect(effect, preset.params);
        const hasSource = uploadedImagePath || (currentSourceType === 'generated' && currentSourcePath);
        if (hasSource) {
          processImage();
        }
      }
    }

    async function saveCurrentAsPreset() {
      if (!selectedEffect) return;

      const name = prompt('Preset name:');
      if (!name) return;

      const params = {};
      document.querySelectorAll('[data-param]').forEach(input => {
        params[input.dataset.param] = input.value;
      });

      try {
        const response = await fetch('/api/presets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, effectId: selectedEffect.id, params })
        });

        if (response.ok) {
          loadPresets();
          showStatus(`Preset "${name}" saved`, 'success');
        } else {
          showStatus('Failed to save preset', 'error');
        }
      } catch (error) {
        showStatus(error.message, 'error');
      }
    }

    async function deletePreset(name) {
      try {
        const response = await fetch(`/api/presets/${encodeURIComponent(name)}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          loadPresets();
          showStatus('Preset deleted', 'success');
        } else {
          showStatus('Failed to delete preset', 'error');
        }
      } catch (error) {
        showStatus(error.message, 'error');
      }
    }

    document.getElementById('savePresetBtn').onclick = saveCurrentAsPreset;
  </script>
</body>
</html>
