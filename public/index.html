<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaleidoscope Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      text-align: center;
    }

    h1 {
      font-size: 2em;
      background: linear-gradient(45deg, #fff, #ccc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Controls Panel */
    .controls-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 68, 68, 0.6);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .controls-title {
      color: #ff4444;
      font-weight: 700;
      font-size: 1.2em;
      margin-bottom: 16px;
      text-align: center;
      background: #fff;
      color: #ff4444;
      padding: 6px 16px;
      border-radius: 4px;
      display: inline-block;
      margin-left: 50%;
      transform: translateX(-50%);
    }

    .controls-content {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 20px;
      align-items: start;
    }

    /* Upload section */
    .upload-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.9em;
    }

    .upload-area:hover {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.05);
    }

    .upload-area.active {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    #imageInput {
      display: none;
    }

    /* Effects section */
    .effects-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .effect-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .effect-btn {
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.85em;
      text-align: left;
    }

    .effect-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .effect-btn.active {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-color: #22c55e;
    }

    /* Params and button */
    .action-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .params {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      padding: 12px;
      display: none;
      max-height: 150px;
      overflow-y: auto;
    }

    .params.visible {
      display: block;
    }

    .param-group {
      margin-bottom: 10px;
    }

    .param-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.8em;
      color: #ccc;
      margin-bottom: 4px;
    }

    input[type="range"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 6px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #fff;
      font-size: 0.8em;
    }

    .process-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      color: #fff;
      border-radius: 6px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .process-btn:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-2px);
    }

    .process-btn:disabled {
      background: rgba(255, 255, 255, 0.1);
      cursor: not-allowed;
      transform: none;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      display: none;
      font-size: 0.85em;
      text-align: center;
    }

    .status.visible {
      display: block;
    }

    .status.loading {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.5);
    }

    .status.success {
      background: rgba(74, 222, 128, 0.2);
      color: #86efac;
      border: 1px solid rgba(74, 222, 128, 0.5);
    }

    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.5);
    }

    /* Main content area */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 68, 68, 0.6);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-title {
      color: #ff4444;
      font-weight: 700;
      font-size: 1.2em;
      margin-bottom: 16px;
      text-align: center;
      background: #fff;
      color: #ff4444;
      padding: 6px 16px;
      border-radius: 4px;
      display: inline-block;
      align-self: center;
    }

    /* Sources panel */
    .sources-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .source-preview {
      flex: 1;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
    }

    .source-preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .source-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(74, 222, 128, 0.8);
      color: #000;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.8em;
      font-weight: 600;
    }

    .no-source {
      color: #666;
      text-align: center;
    }

    /* Results panel */
    .results-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .results-scroll {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      min-height: 0;
    }

    .result-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .result-item:hover {
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .result-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .result-info {
      padding: 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .download-btn, .use-source-btn {
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75em;
      transition: all 0.2s ease;
      border: 1px solid;
      background: rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      border-color: rgba(59, 130, 246, 0.5);
      text-decoration: none;
      text-align: center;
    }

    .download-btn:hover {
      background: rgba(59, 130, 246, 0.5);
    }

    .use-source-btn {
      background: rgba(74, 222, 128, 0.2);
      color: #86efac;
      border-color: rgba(74, 222, 128, 0.5);
    }

    .use-source-btn:hover {
      background: rgba(74, 222, 128, 0.4);
    }

    .use-source-btn.active {
      background: rgba(74, 222, 128, 0.6);
      border-color: #22c55e;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Scrollbar styling */
    .results-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .results-scroll::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }

    .results-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    .results-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 1024px) {
      .controls-content {
        grid-template-columns: 1fr;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .app {
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>✨ Kaleidoscope Generator</h1>
    </header>

    <!-- Controls Panel -->
    <div class="controls-panel">
      <div class="controls-title">Controls</div>
      <div class="controls-content">
        <!-- Upload -->
        <div class="upload-section">
          <div class="upload-area" id="uploadArea">
            <div>Click or drag image</div>
            <input type="file" id="imageInput" accept="image/*">
          </div>
        </div>

        <!-- Effects -->
        <div class="effects-section">
          <div class="effect-grid" id="effectGrid"></div>
          <div class="params" id="paramsContainer"></div>
        </div>

        <!-- Action -->
        <div class="action-section">
          <div class="status" id="status"></div>
          <button class="process-btn" id="processBtn" disabled>Generate</button>
        </div>
      </div>
    </div>

    <!-- Content Grid -->
    <div class="content-grid">
      <!-- Sources -->
      <div class="panel">
        <div class="panel-title">Sources</div>
        <div class="sources-panel">
          <div class="source-preview" id="sourcePreview">
            <div class="no-source">No image selected</div>
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="panel">
        <div class="panel-title">Results</div>
        <div class="results-panel">
          <div class="results-scroll" id="results"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedEffect = null;
    let uploadedImagePath = null;
    let currentSourcePath = null;
    let currentSourceType = null;

    // Load effects
    fetch('/api/effects')
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('effectGrid');
        data.effects.forEach(effect => {
          const btn = document.createElement('button');
          btn.className = 'effect-btn';
          btn.textContent = effect.name;
          btn.onclick = () => selectEffect(effect);
          grid.appendChild(btn);
        });
      });

    // Upload handling
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');

    uploadArea.onclick = () => imageInput.click();
    uploadArea.ondrop = (e) => {
      e.preventDefault();
      uploadArea.classList.remove('active');
      handleImageUpload(e.dataTransfer.files[0]);
    };
    uploadArea.ondragover = () => uploadArea.classList.add('active');
    uploadArea.ondragleave = () => uploadArea.classList.remove('active');
    imageInput.onchange = (e) => handleImageUpload(e.target.files[0]);

    function handleImageUpload(file) {
      if (!file.type.startsWith('image/')) {
        showStatus('Please select an image file', 'error');
        return;
      }

      currentSourceType = 'upload';
      currentSourcePath = null;
      uploadedImagePath = 'uploaded';

      document.querySelectorAll('.use-source-btn.active').forEach(btn => {
        btn.classList.remove('active');
      });

      const reader = new FileReader();
      reader.onload = (e) => {
        updateSourcePreview(e.target.result, 'upload');
        updateProcessBtn();
      };
      reader.readAsDataURL(file);

      showStatus('✓ Image uploaded', 'success');
    }

    function updateSourcePreview(src, type) {
      const preview = document.getElementById('sourcePreview');
      preview.innerHTML = `<img src="${src}" alt="Source">`;
      if (type === 'generated') {
        const badge = document.createElement('div');
        badge.className = 'source-badge';
        badge.textContent = 'From result';
        preview.appendChild(badge);
      }
    }

    function selectEffect(effect) {
      selectedEffect = effect;

      document.querySelectorAll('.effect-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      const paramsContainer = document.getElementById('paramsContainer');
      paramsContainer.innerHTML = '';
      paramsContainer.classList.remove('visible');

      if (Object.keys(effect.params).length > 0) {
        paramsContainer.classList.add('visible');
        Object.entries(effect.params).forEach(([key, defaultVal]) => {
          const group = document.createElement('div');
          group.className = 'param-group';

          const label = document.createElement('label');
          label.textContent = key.charAt(0).toUpperCase() + key.slice(1);

          const input = document.createElement('input');
          input.type = 'text';
          input.value = defaultVal;
          input.dataset.param = key;

          group.appendChild(label);
          group.appendChild(input);
          paramsContainer.appendChild(group);
        });
      }

      updateProcessBtn();
    }

    function updateProcessBtn() {
      const btn = document.getElementById('processBtn');
      const hasSource = uploadedImagePath || (currentSourceType === 'generated' && currentSourcePath);
      btn.disabled = !selectedEffect || !hasSource;
    }

    document.getElementById('processBtn').onclick = async () => {
      const btn = document.getElementById('processBtn');
      btn.disabled = true;

      showStatus('<span class="loading-spinner"></span>Processing...', 'loading');

      const formData = new FormData();

      if (currentSourceType === 'generated' && currentSourcePath) {
        formData.append('existingImage', currentSourcePath);
      } else {
        const imageFile = document.getElementById('imageInput').files[0];
        if (imageFile) {
          formData.append('image', imageFile);
        }
      }

      formData.append('effect', selectedEffect.id);

      const params = {};
      document.querySelectorAll('[data-param]').forEach(input => {
        params[input.dataset.param] = input.value;
      });
      formData.append('params', JSON.stringify(params));

      try {
        const response = await fetch('/api/process', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Processing failed');
        const result = await response.json();

        if (result.success) {
          addResult(selectedEffect.name, result.outputPath);
          showStatus(`✓ Done`, 'success');
        } else {
          showStatus(result.error, 'error');
        }
      } catch (error) {
        showStatus(error.message, 'error');
      }

      btn.disabled = false;
    };

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.innerHTML = message;
      status.className = `status visible ${type}`;
    }

    function addResult(title, imagePath) {
      const results = document.getElementById('results');
      const item = document.createElement('div');
      item.className = 'result-item';
      const buttonId = `use-source-${Date.now()}`;
      item.innerHTML = `
        <img src="${imagePath}" alt="${title}" class="result-image">
        <div class="result-info">
          <div class="result-buttons">
            <button class="use-source-btn" id="${buttonId}">Use</button>
            <a href="${imagePath}" download class="download-btn">Download</a>
          </div>
        </div>
      `;
      results.prepend(item);

      document.getElementById(buttonId).onclick = (e) => {
        e.preventDefault();
        useAsSource(imagePath, buttonId);
      };
    }

    function useAsSource(imagePath, buttonId) {
      document.querySelectorAll('.use-source-btn.active').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById(buttonId).classList.add('active');

      updateSourcePreview(imagePath, 'generated');

      currentSourcePath = imagePath;
      currentSourceType = 'generated';
      uploadedImagePath = null;
      document.getElementById('imageInput').value = '';

      updateProcessBtn();

      showStatus('✓ Using result as source', 'success');
    }
  </script>
</body>
</html>
